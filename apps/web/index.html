<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- viewport-fit=cover lets us draw under iOS notch/home indicator,
         handled via env(safe-area-inset-*) in CSS -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>Studioflow</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Chrome / Android: address-bar + task-switcher color -->
    <meta name="theme-color" content="#0e0e0e" />

    <!-- iOS standalone PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- black-translucent: status bar overlaps the app (we pad via safe-area CSS) -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Studioflow" />

    <!-- iOS home screen icon -->
    <link rel="apple-touch-icon" href="/icon-512.png" />

    <!-- Open Graph -->
    <meta property="og:title" content="Studioflow" />
    <meta property="og:description" content="Your music projects, organized." />
    <meta property="og:type" content="website" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;700&family=Cal+Sans:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
