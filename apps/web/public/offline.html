<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Studioflow</title>
  <style>
    :root {
      --bg: #0e0e0e;
      --surface: #151515;
      --border: rgba(255, 255, 255, 0.07);
      --text: #e2e2e2;
      --text-2: #8c8c8c;
      --accent: #3388dd;
      --r-2: 6px;
      --r-3: 10px;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      gap: 0;
      min-height: 100svh;
    }

    .card {
      width: min(100%, 400px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-3);
      padding: 36px 32px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .icon {
      width: 52px;
      height: 52px;
      background: rgba(51, 136, 221, 0.12);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
    }

    h1 {
      font-size: 1.1875rem;
      font-weight: 600;
      margin: 0;
      color: var(--text);
      line-height: 1.3;
    }

    p {
      font-size: 0.875rem;
      color: var(--text-2);
      line-height: 1.6;
      margin: 0;
    }

    button {
      margin-top: 4px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 0 18px;
      height: 38px;
      font-size: 0.875rem;
      font-weight: 500;
      border-radius: var(--r-2);
      border: 1px solid rgba(51, 136, 221, 0.4);
      background: rgba(51, 136, 221, 0.12);
      color: var(--accent);
      cursor: pointer;
      font-family: inherit;
      transition: background 0.12s, border-color 0.12s;
    }

    button:hover {
      background: rgba(51, 136, 221, 0.2);
      border-color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M3 12a9 9 0 1 0 18 0 9 9 0 0 0-18 0Z" stroke="currentColor" stroke-width="1.5"/>
        <path d="M12 7v5l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M2 2l20 20" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>No internet connection detected. Previously loaded pages are still available — try navigating back.</p>
    <button onclick="window.location.reload()">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none" aria-hidden="true">
        <path d="M2 6.5A4.5 4.5 0 0 1 10.5 3.5L11 2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        <path d="M11 6.5A4.5 4.5 0 0 1 2.5 9.5L2 11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      Try again
    </button>
  </div>
</body>
</html>
